<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SenSante - Pre-diagnostic</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 min-h-screen">

<header class="bg-blue-600 text-white py-4 shadow-lg">
    <div class="max-w-4xl mx-auto px-4">
        <h1 class="text-2xl font-bold">SenSante</h1>
        <p class="text-blue-100 text-sm">Assistant pre-diagnostic medical</p>
    </div>
</header>

<main class="max-w-4xl mx-auto px-4 py-8">

<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

<!-- FORM -->
<div class="bg-white rounded-xl shadow-md p-6">
    <h2 class="text-xl font-bold mb-4">Symptomes</h2>

    <input id="age" type="number" placeholder="Age" class="w-full border p-2 mb-2 rounded">

    <select id="sexe" class="w-full border p-2 mb-2 rounded">
        <option value="F">F</option>
        <option value="M">M</option>
    </select>

    <input id="temperature" type="number" placeholder="Température" class="w-full border p-2 mb-2 rounded">

    <input id="tension_sys" type="number" placeholder="Tension" class="w-full border p-2 mb-2 rounded">

    <label><input type="checkbox" id="toux"> Toux</label><br>
    <label><input type="checkbox" id="fatigue"> Fatigue</label><br>
    <label><input type="checkbox" id="maux_tete"> Maux de tête</label><br>

    <select id="region" class="w-full border p-2 mt-2 rounded">
        <option>Dakar</option>
        <option>Thies</option>
        <option>Saint-Louis</option>
    </select>

    <button onclick="diagnostiquer()" class="w-full bg-blue-600 text-white p-3 mt-3 rounded">
        Diagnostiquer
    </button>
</div>

<!-- RESULT -->
<div id="result-section">
    <div class="bg-white p-6 rounded-xl text-gray-400 text-center">
        Remplir formulaire
    </div>
</div>

</div>

<!-- HISTORIQUE -->
<div id="historique-section" class="hidden mt-8">
    <div class="bg-white p-4 rounded-xl shadow">
        <h2 class="font-bold mb-2">Historique</h2>
        <table class="w-full text-sm">
            <thead>
                <tr>
                    <th>#</th><th>Age</th><th>Region</th><th>Diag</th><th>%</th><th>Heure</th>
                </tr>
            </thead>
            <tbody id="historique-body"></tbody>
        </table>
    </div>
</div>

</main>

<script>
const API_URL = "http://localhost:8000";

/* =====================
   EXERCICE 1
===================== */
const icones = {
    palu: "🦟",
    grippe: "🤧",
    typh: "🌡️",
    sain: "✅"
};

/* =====================
   EXERCICE 2
===================== */
const historique = [];

/* =====================
   PREDICTION
===================== */
async function diagnostiquer() {

    const patient = {
        age: parseInt(document.getElementById("age").value),
        sexe: document.getElementById("sexe").value,
        temperature: parseFloat(document.getElementById("temperature").value),
        tension_sys: parseInt(document.getElementById("tension_sys").value),
        toux: document.getElementById("toux").checked,
        fatigue: document.getElementById("fatigue").checked,
        maux_tete: document.getElementById("maux_tete").checked,
        region: document.getElementById("region").value
    };

    const res = await fetch(API_URL + "/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(patient)
    });

    const data = await res.json();

    afficherResultat(data);
    ajouterHistorique(patient, data);
}

/* =====================
   RESULTAT
===================== */
function afficherResultat(r) {

    const c = {
        palu: {bg:"bg-red-100", text:"text-red-700", bar:"bg-red-500"},
        grippe: {bg:"bg-orange-100", text:"text-orange-700", bar:"bg-orange-500"},
        typh: {bg:"bg-yellow-100", text:"text-yellow-700", bar:"bg-yellow-500"},
        sain: {bg:"bg-green-100", text:"text-green-700", bar:"bg-green-500"}
    }[r.diagnostic] || {};

    const ico = icones[r.diagnostic] || "🩺";
    const pct = Math.round(r.probabilite * 100);

    document.getElementById("result-section").innerHTML = `
        <div class="bg-white p-6 rounded-xl shadow">
            <h2 class="font-bold mb-3">Résultat</h2>

            <div class="${c.bg} p-3 rounded mb-3">
                ${ico} <b>${r.diagnostic}</b>
            </div>

            <div class="mb-3">
                <div class="flex justify-between">
                    <span>Probabilité</span>
                    <span>${pct}%</span>
                </div>
                <div class="bg-gray-200 h-3 rounded">
                    <div class="${c.bar} h-3 rounded" style="width:${pct}%"></div>
                </div>
            </div>

            <p>${r.message}</p>
        </div>
    `;

    demanderExplication(r);
}

/* =====================
   /EXPLAIN GROQ
===================== */
async function demanderExplication(r) {

    const data = {
        diagnostic: r.diagnostic,
        probabilite: r.probabilite,
        age: parseInt(document.getElementById("age").value),
        sexe: document.getElementById("sexe").value,
        temperature: parseFloat(document.getElementById("temperature").value),
        region: document.getElementById("region").value
    };

    const div = document.createElement("div");
    div.className = "bg-purple-50 p-3 mt-3 rounded";
    div.innerHTML = "⏳ Explication IA...";

    document.getElementById("result-section").appendChild(div);

    try {
        const res = await fetch(API_URL + "/explain", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(data)
        });

        const result = await res.json();

       div.innerHTML = `
    <div class="mt-4 bg-purple-50 border border-purple-200 rounded-xl p-4">
        <p class="text-purple-700 font-bold mb-2">
            🤖 Explication (Groq)
        </p>

        <p class="text-gray-700 text-sm leading-relaxed">
            ${result.explication}
        </p>

        <p class="text-xs text-gray-400 mt-2">
            ⚠️ Ceci ne remplace pas un avis médical réel
        </p>
    </div>
`;
    } catch (e) {
        div.innerHTML = "Erreur explication IA";
    }
}

/* =====================
   HISTORIQUE
===================== */
function ajouterHistorique(p, r) {

    const time = new Date().toLocaleTimeString();

    historique.unshift({p, r, time});
    if (historique.length > 5) historique.pop();

    document.getElementById("historique-section").classList.remove("hidden");

    document.getElementById("historique-body").innerHTML =
        historique.map((h, i) => `
            <tr>
                <td>${i+1}</td>
                <td>${h.p.age}</td>
                <td>${h.p.region}</td>
                <td>${h.r.diagnostic}</td>
                <td>${Math.round(h.r.probabilite*100)}%</td>
                <td>${h.time}</td>
            </tr>
        `).join("");
}
</script>

</body>
</html>
